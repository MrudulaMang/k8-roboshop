apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
    #matchExpressions:
    #- key: app
    #  operator: In
    #  values:
    #    - backend
    #    - api  
  tempalte:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb
    spec:    
      containers:
        - name: mongodb
         image: mrudula158/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata: 
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb  
spec:
  selector:
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017 #service port
    targePort: 27017  #container mongo port

#Service → uses selector (no matchLabels)
#ReplicaSet / Deployment → uses selector.matchLabels