apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend 
    component: user  
data:
  MONGO: "true" 
  MONGO_URL: "mongodb://mongodb:27017/users"
  REDIS_URL: "redis://redis:6379"
---  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend 
    component: user
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend 
      component: user
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend 
        component: user    
    spec:
      containers:
        - name: user
          image: mrudula158/user:1.2.0
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "100m" 
          readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
            tcpSocket:
              port: 8080
            failureThreshold: 2 #number of times try to restart 
            periodSeconds: 10 # for every 10 secs probe
            initialDelaySeconds: 15 #5 # wait before first probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 2
            periodSeconds: 10    
          envFrom:
          - configMapRef:
              name: user
---
apiVersion: v1
kind: Service
metadata: 
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend 
    component: user
spec:
  selector:
    project: roboshop
    tier: backend 
    component: user
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
