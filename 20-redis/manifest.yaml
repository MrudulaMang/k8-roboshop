apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  replicas: 1
  selector:  
    matchLabels:
    project: roboshop
    tier: db
    component: mongodb
  template:
    metadata:
      labels:
      project: roboshop
      tier: db
      component: mongodb    
    spec:
        containers:
        - name: redis
          image: redis:7.0
---    
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector:
    project: roboshop
    tier: db
    component: mongodb    
  ports:
    - protocol: TCP
      port: 6379
      targePort: 6379 