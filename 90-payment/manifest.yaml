apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
data:  
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      #AMQP_PORT: "5672"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop  
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: payment
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: payment
    spec:    
      containers:
      - name: payment
        image: mrudula158/payment:1.2.0
        imagePullPolicy: Always
      # command: ["sleep", "2000"] -> can give command at kubernetes level also
        envFrom:
        - configMapRef: 
            name: payment
        resources:
          requests:
            cpu: 100m
            memory: 128mi
          limits:
            cpu: 100m
            memory: 128mi
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10 
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  selector:
    project: roboshop
    tier: backend
    component: payment
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080  

# in docker payment.ini commented uid=1001 and gid=1001
#“Avoid UID mismatch between host/container causing permission issues”
# Alpine does not guarantee UID range
# It depends on image/user creation

# 💡 Real issue is:

# Container runs as non-root
# Files owned by different UID → permission issue



