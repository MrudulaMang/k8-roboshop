apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
data:  
      CART_HOST: "cart"
      CART-PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS:  "roboshop123"
---
apiVersion: v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  replicas: 1
  selector:
  matchLabels:
    project: roboshop
    tier: backend
    component: payment
template:
    containers:
    - name: payment
      image: mrudula158/payment:1.0.0
      imagePullPolicy: Always
      # command: ["sleep", "2000"] -> can give command at kubernetes level also
      resources:
        requests:
          cpu: 100m
          memory: 128mi
        limits:
          cpu: 100m
          memory: 128mi
      readinessProbe:
        tcpSocket:
          port: 8080
        failureThreshold: 2
        initialDelaySeconds: 10
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
          failureThreshold: 2
          periodSeconds: 10 
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  selector:
    project: roboshop
    tier: backend
    component: payment
  ports:
    protocol: TCP
    port: 8080
    targetPort: 8080  

# in docker payment.ini comment uid=1001 and gid=1001
# as we are using alpine start from 100, so, we get id's uid 100 gid 101


