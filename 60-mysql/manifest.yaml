apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
      containers:
        - name: mysql
          image: mrudula158/mysql:1.2.0
        #  env:
        #  - name: MYSQL_ROOT_PASSWORD
        #    value: "root"
        #  readinessProbe:
        # tcpSocket:
        #   port: 3306
        # initialDelaySeconds: 10
        # periodSeconds: 10
        #  resources:
        # requests:
        #   cpu: 100m
        #   memory: 256Mi
        # limits:
        #   cpu: 200m
        #   memory: 512Mi
---
apiVersion: v1
kind: Service
metadata: 
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  selector:
    project: roboshop
    tier: db
    component: mysql            
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306        
