apiVersion: v1
kind: Deployment
metadata:
  name: mysql
  naemspace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
      containers:
        - name: mysql
          image: mrudula158/mqsql:1.0.0
---
apiVersion: v1
kind: Service
metadata: 
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  selector:
    project: roboshop
    tier: db
    component: mysql            
  ports:
    protocol: TCP
    port: 3306
    targePort: 3306        
