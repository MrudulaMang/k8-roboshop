apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend 
    component: catalogue  
data:
  MONGODB= "true"
  MONGO_URL= "mongodb://mongodb:27017/catalogue"  
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend 
    component: catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend 
      component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend 
        component: catalogue    
    spec:
      containers:
        - name: catalogue
          image: mrudula158/catalogue
          imagePullPolicy: Always
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "100m" 
      readinessprobe:
        # httpGet:
        #   path: /health
        #   port: 8080
        tcpSocket:
          port: 8080
        failureThreshold: 2 #number of times try to restart 
        periodSeconds: 10 # for every 10 secs probe
        initialDelaySeconds: 15 #5 # wait before first probe
      livenessprobe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 2
        periodSEconds: 10    
      envFrom:
      - configMapRef:
          name: catalogue
---
apiversion: v1
kind: Service
metadata: 
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend 
    component: catalogue
spec:
  selector:
    project: roboshop
    tier: backend 
    component: catalogue
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080


